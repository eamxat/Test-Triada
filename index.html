<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xat Waves</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/eamxat/Images/refs/heads/main/favicon-16x16.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a id="xat-logo-link" href="https://xat.com/" target="_blank" rel="noopener noreferrer" title="Ir a xat.com">
        <img src="https://raw.githubusercontent.com/eamxat/Images/07a374086611d37452aa57edab1ae672f616f4d0/xatlogo%20text2.svg" alt="xat logo">
    </a>

    <div id="ui-wrapper">
        <div id="panel-toggle" title="Mostrar/Ocultar Controles">≡</div>

        <div id="horizontal-toolbar">
            <div class="control-group">
                <label for="ctrl-color1">Color 1</label>
                <div class="color-indicator" id="ind-color1" onclick="window.open('https://wiki.xat.com/Colors/es', '_blank')" title="Ver códigos de color"></div>
                <input type="text" id="ctrl-color1" class="hex-input" spellcheck="false" autocomplete="off" maxlength="7">
            </div>
            <div class="control-group">
                <label for="ctrl-color2">Color 2</label>
                <div class="color-indicator" id="ind-color2" onclick="window.open('https://wiki.xat.com/Colors/es', '_blank')" title="Ver códigos de color"></div>
                <input type="text" id="ctrl-color2" class="hex-input" spellcheck="false" autocomplete="off" maxlength="7">
            </div>
            <div class="control-group">
                <label for="ctrl-color3">Color 2</label>
                <div class="color-indicator" id="ind-color3" onclick="window.open('https://wiki.xat.com/Colors/es', '_blank')" title="Ver códigos de color"></div>
                <input type="text" id="ctrl-color3" class="hex-input" spellcheck="false" autocomplete="off" maxlength="7">
            </div>
            
            <div class="separator"></div>
            
            <div class="control-group" title="Desplazamiento">
                <label for="ctrl-offset">Desplaz.</label>
                <input type="range" id="ctrl-offset" min="0" max="2" step="0.01">
            </div>
            <div class="control-group">
                <label for="ctrl-contrast">Contraste</label>
                <input type="range" id="ctrl-contrast" min="0" max="5" step="0.01">
            </div>
            
            <div class="separator"></div>
            
            <div class="control-group">
                <label for="ctrl-speed">Velocidad</label>
                <input type="range" id="ctrl-speed" min="0" max="1" step="0.01">
            </div>
            <div class="control-group">
                <label for="ctrl-elevation">Altura</label>
                <input type="range" id="ctrl-elevation" min="0" max="5" step="0.01">
            </div>
            <div class="control-group">
                <label for="ctrl-frequency">Detalle</label>
                <input type="range" id="ctrl-frequency" min="0.05" max="1" step="0.01">
            </div>
            
            <div class="separator"></div>

            <div class="control-group">
                <label for="ctrl-wireframe">Malla</label>
                <input type="checkbox" id="ctrl-wireframe">
            </div>

            <div id="close-btn" title="Retraer Panel">×</div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
